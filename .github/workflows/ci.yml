name: CI/CD

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push task-tracker
        uses: docker/build-push-action@v5
        with:
          context: ./task-tracker
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/task-tracker:latest

      - name: Build and push email-sender
        uses: docker/build-push-action@v5
        with:
          context: ./email-sender
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/email-sender:latest

      - name: Build and push scheduler
        uses: docker/build-push-action@v5
        with:
          context: ./scheduler
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/scheduler:latest

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/frontend:latest